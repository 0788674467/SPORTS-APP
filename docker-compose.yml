version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sports_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sports_app
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sports_backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sports_app
    ports:
      - '3000:3000'
    volumes:
      - ./backend/src:/app/src

volumes:
  pgdata:
